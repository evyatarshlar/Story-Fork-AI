<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a3347"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="url(#bgGrad)"/>

  <!-- Left book page -->
  <path d="M4 11.5 C4 10.5 5 9.5 6 10 L15 11.5 L15 23.5 L6 22 C5 21.7 4 20.7 4 19.7 Z" fill="#c5ddf0"/>
  <!-- Right book page -->
  <path d="M17 11.5 L26 10 C27 9.5 28 10.5 28 11.5 L28 19.7 C28 20.7 27 21.7 26 22 L17 23.5 Z" fill="#daedf8"/>
  <!-- Book spine -->
  <rect x="15" y="11" width="2" height="13" rx="1" fill="#4a6fa5"/>

  <!-- Fork stem -->
  <line x1="16" y1="13.5" x2="16" y2="17.5" stroke="#48cae4" stroke-width="2" stroke-linecap="round"/>
  <!-- Fork left branch -->
  <line x1="16" y1="17.5" x2="10.5" y2="22" stroke="#48cae4" stroke-width="2" stroke-linecap="round"/>
  <!-- Fork right branch -->
  <line x1="16" y1="17.5" x2="21.5" y2="22" stroke="#48cae4" stroke-width="2" stroke-linecap="round"/>

  <!-- Dots at branch ends -->
  <circle cx="16" cy="13" r="1.5" fill="#48cae4"/>
  <circle cx="10.5" cy="22.5" r="1.5" fill="#166d89"/>
  <circle cx="21.5" cy="22.5" r="1.5" fill="#166d89"/>

  <!-- AI sparkle (4-pointed star top-right) -->
  <path d="M26 4 L26.6 6.4 L29 7 L26.6 7.6 L26 10 L25.4 7.6 L23 7 L25.4 6.4 Z" fill="#48cae4"/>
</svg>